<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay</title>
    <script>
      // Runs before first paint: hide the center stage when digits are
      // disabled, so the static "5" below never flashes on screen.
      (function () {
        try {
          var digits = new URLSearchParams(location.search).get("digits");
          var hide;
          if (digits !== null) {
            hide = digits === "0";
          } else {
            // No query param (e.g. older native binary): fall back to the
            // config the settings window wrote just before opening us.
            var cfg = JSON.parse(localStorage.getItem("co.overlay.config.v1") || "{}");
            hide = cfg.showDigits === false;
          }
          if (hide) document.documentElement.classList.add("no-digits");
        } catch (e) {
          /* default: show digits */
        }
      })();
    </script>
    <link rel="stylesheet" href="/src/overlay/style.css" />
  </head>
  <body class="overlay-body">
    <!-- Animated theme background (Canvas 2D). -->
    <canvas id="bg" class="bg-canvas"></canvas>

    <!-- Foreground particle layer. -->
    <canvas id="fx" class="fx-canvas"></canvas>

    <!-- Realistic smoke layers (above the number so they can obscure → reveal).
         #fluid = WebGL2 fluid sim (preferred); #smoke = Canvas2D fallback. -->
    <canvas id="fluid" class="smoke-canvas"></canvas>
    <canvas id="smoke" class="smoke-canvas"></canvas>

    <!-- White impact flash. -->
    <div class="flash" id="flash" aria-hidden="true"></div>

    <!-- Top "alert" decorations. -->
    <div class="top-fx" aria-hidden="true">
      <div class="scanline"></div>
      <div class="beam"></div>
      <div class="banner">
        <span class="banner-text" id="banner">COUNTDOWN</span>
      </div>
    </div>

    <!-- Center stage. -->
    <div class="stage">
      <div class="shockwave" id="shockwave" aria-hidden="true"></div>
      <div class="glow" id="glow" aria-hidden="true"></div>
      <div class="number number-ghost ghost-a" id="ghostA" aria-hidden="true">5</div>
      <div class="number number-ghost ghost-b" id="ghostB" aria-hidden="true">5</div>
      <div class="number" id="number">5</div>
    </div>

    <script type="module" src="/src/overlay/main.ts"></script>
  </body>
</html>
