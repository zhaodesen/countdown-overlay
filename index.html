<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>倒计时 Overlay · 控制台</title>
    <link rel="stylesheet" href="/src/settings/style.css" />
    <script>
      try {
        const saved = JSON.parse(localStorage.getItem("co.settings.v1") || "{}");
        document.documentElement.dataset.theme = saved.colorMode === "light" ? "light" : "dark";
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#home" aria-label="倒计时 Overlay 首页">
        <span class="brand-mark" aria-hidden="true">5</span>
        <span>倒计时 Overlay</span>
      </a>

      <nav class="primary-nav" aria-label="主菜单">
        <button class="nav-item active" type="button" data-view="home">首页</button>
        <button class="nav-item" type="button" data-view="themes">动画效果</button>
        <button class="nav-item" type="button" data-view="settings">设置</button>
      </nav>

      <div class="header-tools">
        <div class="mode-switch" role="group" aria-label="界面主题">
          <button type="button" data-theme-choice="dark" aria-pressed="true">深色</button>
          <button type="button" data-theme-choice="light" aria-pressed="false">浅色</button>
        </div>
        <label class="sound-toggle">
          <span id="soundLabel">音效 开</span>
          <input type="checkbox" id="soundToggle" />
        </label>
      </div>
    </header>

    <main class="app-main">
      <section class="view home-view active" data-view-panel="home">
        <div class="time-hero" aria-label="北京时间">
          <div class="time-label">北京时间</div>
          <div class="clock-date" id="clockDate">--</div>
          <div class="clock-time" id="clockTime">--:--:--</div>
        </div>

        <section class="task-workspace" aria-labelledby="taskHeading">
          <div class="section-head">
            <div class="section-title-row">
              <h1 id="taskHeading">定时任务</h1>
              <span class="count" id="taskCount">0</span>
            </div>
            <button class="btn primary" id="addTask">+ 新建任务</button>
          </div>

          <div class="task-table" id="taskTable">
            <div class="task-table-head" aria-hidden="true">
              <span>任务名称</span>
              <span>目标时间</span>
              <span>重复</span>
              <span>主题</span>
              <span>启用</span>
              <span>操作</span>
            </div>
            <div class="task-list" id="taskList"></div>
          </div>

          <div class="empty" id="emptyTasks">
            <strong>还没有任务</strong>
            <span>点击「新建任务」创建第一个倒计时。</span>
          </div>
        </section>

        <footer class="page-note">所有任务时间均基于北京时间</footer>
      </section>

      <section class="view themes-view" data-view-panel="themes" hidden>
        <div class="library-head">
          <div>
            <div class="eyebrow">动画库</div>
            <h1 id="themeHeading">动画效果 · 11 款</h1>
            <p>预览图按需加载；滚动时仅渲染可见主题。</p>
          </div>
          <span class="library-meta">点击预览，全屏播放 5→1</span>
        </div>
        <div class="theme-viewport" id="themeViewport" tabindex="0" aria-label="动画主题列表">
          <div class="theme-virtual-canvas" id="themeVirtualCanvas"></div>
        </div>
      </section>

      <section class="view settings-view" data-view-panel="settings" hidden>
        <div class="settings-head">
          <div class="eyebrow">偏好设置</div>
          <h1>设置</h1>
          <p>外观和声音设置会自动保存在本机。</p>
        </div>

        <div class="settings-list">
          <section class="setting-row">
            <div>
              <h2>界面主题</h2>
              <p>在深色和浅色界面之间切换。</p>
            </div>
            <div class="mode-switch large" role="group" aria-label="设置界面主题">
              <button type="button" data-theme-choice="dark" aria-pressed="true">深色</button>
              <button type="button" data-theme-choice="light" aria-pressed="false">浅色</button>
            </div>
          </section>

          <section class="setting-row">
            <div>
              <h2>倒计时音效</h2>
              <p>控制预览与定时触发时的提示音。</p>
            </div>
            <label class="setting-switch">
              <input type="checkbox" id="settingsSoundToggle" />
              <span>启用音效</span>
            </label>
          </section>
        </div>
      </section>
    </main>

    <dialog id="taskDialog" class="dialog">
      <form method="dialog" id="taskForm">
        <div class="dialog-head">
          <div class="eyebrow">任务配置</div>
          <h3 id="dialogTitle">新建任务</h3>
        </div>

        <label class="field">
          <span>任务名称</span>
          <input id="f_name" type="text" maxlength="40" placeholder="例如：起飞倒计时" required />
        </label>

        <label class="field">
          <span>目标时间（北京时间，含秒）</span>
          <input id="f_time" type="datetime-local" step="1" required />
        </label>

        <div class="field">
          <span>类型</span>
          <div class="radios">
            <label><input type="radio" name="ttype" value="once" checked /> 一次性</label>
            <label><input type="radio" name="ttype" value="repeat" /> 重复</label>
          </div>
        </div>

        <div class="field" id="weekdayRow" hidden>
          <span>重复（周一～周日）</span>
          <div class="weekdays" id="weekdays"></div>
        </div>

        <label class="field">
          <span>动画效果</span>
          <select id="f_theme"></select>
        </label>

        <div class="dialog-actions">
          <button type="button" class="btn" id="cancelDialog">取消</button>
          <button type="submit" class="btn primary" id="saveTask">保存</button>
        </div>
      </form>
    </dialog>

    <div class="status" id="status" role="status"></div>

    <script type="module" src="/src/settings/main.ts"></script>
  </body>
</html>
