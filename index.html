<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bang · 控制台</title>
    <link rel="stylesheet" href="/src/settings/style.css" />
    <script>
      try {
        const saved = JSON.parse(localStorage.getItem("co.settings.v1") || "{}");
        document.documentElement.dataset.theme = saved.colorMode === "light" ? "light" : "dark";
        if (localStorage.getItem("co.navCollapsed") === "1") {
          document.documentElement.classList.add("nav-collapsed");
        }
        // Platform class (set pre-paint to avoid a layout flash).
        // Only macOS has the left-side traffic lights that need a spacer.
        var platform = navigator.platform || navigator.userAgent;
        var isMac = /Mac/i.test(platform);
        var isWindows = /Win/i.test(platform);
        document.documentElement.classList.add(isMac ? "os-mac" : isWindows ? "os-win" : "os-other");
      } catch {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>
  <body>
    <div class="titlebar-left" data-tauri-drag-region>
      <span class="traffic-spacer" aria-hidden="true"></span>
      <div class="windows-titlebar-brand" aria-hidden="true">
        <img src="/bang-logo.svg" alt="" draggable="false" />
        <span>bang</span>
      </div>
      <button class="tool-btn" id="navToggle" type="button" aria-label="折叠/展开菜单" aria-pressed="false" title="折叠菜单">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect class="panel-fill" x="3.6" y="5.1" width="5" height="13.8" rx="1.6" stroke="none" />
          <rect x="3" y="4.5" width="18" height="15" rx="2.5" />
          <line x1="9" y1="4.5" x2="9" y2="19.5" />
        </svg>
      </button>
      <!-- 以后要加搜索等图标，直接在这里追加 .tool-btn 即可 -->
      <div class="windows-window-controls" aria-label="窗口控制">
        <button class="window-control" id="titlebarMinimize" type="button" aria-label="最小化窗口" title="最小化">
          <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M2 6.5h8" /></svg>
        </button>
        <button class="window-control" id="titlebarMaximize" type="button" aria-label="最大化窗口" title="最大化">
          <svg viewBox="0 0 12 12" aria-hidden="true"><rect x="2.5" y="2.5" width="7" height="7" /></svg>
        </button>
        <button class="window-control window-control-close" id="titlebarClose" type="button" aria-label="关闭窗口" title="关闭">
          <svg viewBox="0 0 12 12" aria-hidden="true"><path d="m2.5 2.5 7 7m0-7-7 7" /></svg>
        </button>
      </div>
    </div>
    <header class="app-header" data-tauri-drag-region>
      <nav class="primary-nav" aria-label="主菜单">
        <button class="nav-item active" type="button" data-view="home">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 11.5 12 4l8 7.5" />
            <path d="M6 10.5V19a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-8.5" />
          </svg>
          <span>首页</span>
        </button>
        <button class="nav-item" type="button" data-view="themes">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 5h14a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z" />
            <path d="m10 9 5 3-5 3V9Z" />
          </svg>
          <span>动画效果</span>
        </button>
        <button class="nav-item" type="button" data-view="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 13.5a7.7 7.7 0 0 0 0-3l1.6-1.2-1.8-3.1-1.9.8a7.6 7.6 0 0 0-2.6-1.5L14.4 2h-3.6l-.3 2a7.6 7.6 0 0 0-2.6 1.5l-1.9-.8L4.2 7.8l1.6 1.2a7.7 7.7 0 0 0 0 3l-1.6 1.2 1.8 3.1 1.9-.8a7.6 7.6 0 0 0 2.6 1.5l.3 2h3.6l.3-2a7.6 7.6 0 0 0 2.6-1.5l1.9.8 1.8-3.1-1.6-1.2Z" />
          </svg>
          <span>设置</span>
        </button>
      </nav>

      <div class="header-tools">
        <button class="icon-toggle" id="themeToggle" type="button" aria-label="切换界面主题">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <g class="icon-sun">
              <circle cx="12" cy="12" r="3.5" />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.42 1.42M17.65 17.65l1.42 1.42M19.07 4.93l-1.42 1.42M6.35 17.65l-1.42 1.42" />
            </g>
            <path class="icon-moon" d="M20 15.25A8 8 0 0 1 8.75 4a8 8 0 1 0 11.25 11.25Z" />
          </svg>
        </button>
        <button class="icon-toggle" id="soundToggle" type="button" aria-label="切换音效" aria-pressed="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <g class="sound-on">
              <path d="M4 9v6h4l5 4V5L8 9H4Z" />
              <path d="M16 8.5a5 5 0 0 1 0 7M18.5 6a8.5 8.5 0 0 1 0 12" />
            </g>
            <g class="sound-off">
              <path d="M4 9v6h4l5 4V5L8 9H4Z" />
              <path d="m17 9 5 5M22 9l-5 5" />
            </g>
          </svg>
        </button>
      </div>
    </header>

    <main class="app-main">
      <section class="view home-view active" data-view-panel="home">
        <div class="home-top">
          <div class="time-hero" aria-label="北京时间">
            <div class="clock-time" id="clockTime">--:--:--</div>
          </div>
          <button class="btn primary add-top" id="addTask">+ 新建任务</button>
        </div>

        <div class="home-body">
          <div class="task-scroll" id="taskScroll" hidden>
            <div class="task-list" id="taskList"></div>
          </div>

          <div class="home-empty" id="homeEmpty">
            <svg class="empty-art" viewBox="0 0 240 200" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="120" cy="178" rx="78" ry="11" class="art-shadow" />
              <circle cx="120" cy="96" r="62" class="art-ring" />
              <circle cx="120" cy="96" r="50" class="art-face" />
              <path d="M120 96 L120 62" class="art-hand-h" />
              <path d="M120 96 L146 108" class="art-hand-m" />
              <circle cx="120" cy="96" r="4.5" class="art-pin" />
              <path d="M104 30 L136 30" class="art-top" />
              <path d="M120 30 L120 22" class="art-stem" />
              <g class="art-spark art-spark-a">
                <path d="M196 52 L196 70 M187 61 L205 61" class="art-plus" />
              </g>
              <g class="art-spark art-spark-b">
                <path d="M44 120 L44 134 M37 127 L51 127" class="art-plus" />
              </g>
            </svg>
            <strong>还没有任务</strong>
            <span>点击右上角「+ 新建任务」创建第一个倒计时。</span>
          </div>
        </div>
      </section>

      <section class="view themes-view" data-view-panel="themes" hidden>
        <div class="theme-viewport" id="themeViewport" tabindex="0" aria-label="动画主题列表">
          <div class="theme-virtual-canvas" id="themeVirtualCanvas"></div>
        </div>
      </section>

      <section class="view settings-view" data-view-panel="settings" hidden>
        <div class="settings-head">
          <div class="eyebrow">偏好设置</div>
          <h1>设置</h1>
          <p>外观和声音设置会自动保存在本机。</p>
        </div>

        <div class="settings-list">
          <section class="setting-row">
            <div>
              <h2>界面主题</h2>
              <p>在深色和浅色界面之间切换。</p>
            </div>
            <div class="mode-switch large" role="group" aria-label="设置界面主题">
              <button type="button" data-theme-choice="dark" aria-pressed="true">深色</button>
              <button type="button" data-theme-choice="light" aria-pressed="false">浅色</button>
            </div>
          </section>

          <section class="setting-row">
            <div>
              <h2>倒计时音效</h2>
              <p>控制预览与定时触发时的提示音。</p>
            </div>
            <label class="setting-switch">
              <input type="checkbox" id="settingsSoundToggle" />
              <span>启用音效</span>
            </label>
          </section>
        </div>
      </section>
    </main>

    <div id="taskModal" class="modal" hidden>
      <div class="modal-backdrop" data-tauri-drag-region></div>
      <form id="taskForm" class="modal-card" novalidate role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
        <div class="dialog-head" data-tauri-drag-region>
          <h3 id="dialogTitle">新建任务</h3>
        </div>

        <label class="field">
          <span>名称</span>
          <input id="f_name" type="text" maxlength="40" placeholder="例如：起飞倒计时" required />
        </label>

        <div class="field">
          <span>类型</span>
          <div class="seg" id="typeSeg" role="group" aria-label="任务类型">
            <button type="button" data-type="once" aria-pressed="true">一次性</button>
            <button type="button" data-type="repeat" aria-pressed="false">重复</button>
            <button type="button" data-type="interval" aria-pressed="false">循环</button>
          </div>
        </div>

        <div class="field" id="targetRow">
          <div class="field-head">
            <span>目标时间（北京时间）</span>
            <div class="seg small" id="targetModeSeg" role="group" aria-label="目标时间类型">
              <button type="button" data-target-mode="time" aria-pressed="true">时间</button>
              <button type="button" data-target-mode="date" aria-pressed="false">日期</button>
            </div>
          </div>
          <input id="f_time" type="time" step="1" />
          <input id="f_datetime" type="datetime-local" step="1" hidden />
          <p class="field-hint" id="timeHint">将在下一个该时刻触发（今天已过则顺延至明天）。</p>
        </div>

        <div class="field" id="weekdayRow" hidden>
          <span>重复（周一～周日）</span>
          <div class="weekdays" id="weekdays"></div>
        </div>

        <div class="field" id="intervalRow" hidden>
          <span>间隔</span>
          <div class="interval-input">
            <span class="interval-prefix">每</span>
            <input id="f_intervalValue" type="number" min="1" step="1" value="30" />
            <select id="f_intervalUnit">
              <option value="second">秒</option>
              <option value="minute" selected>分钟</option>
              <option value="hour">小时</option>
              <option value="day">天</option>
            </select>
            <span class="interval-suffix">执行一次</span>
          </div>
        </div>

        <label class="field">
          <span>动画效果</span>
          <select id="f_theme"></select>
        </label>

        <p class="dialog-error" id="dialogError" role="alert" hidden></p>

        <div class="dialog-actions">
          <button type="button" class="btn" id="cancelDialog">取消</button>
          <button type="button" class="btn primary" id="saveTask">保存</button>
        </div>
      </form>
    </div>

    <script type="module" src="/src/settings/main.ts"></script>
  </body>
</html>
